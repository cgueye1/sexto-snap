# Seddo — nginx derrière le proxy Dokploy (Traefik gère le HTTPS)
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ---- Compression (le bundle camera-kit.mjs passe de ~2 Mo à ~500 Ko) ----
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/html text/css application/javascript application/json
               image/svg+xml text/javascript;
    gzip_vary on;

    # ---- En-têtes de sécurité ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # La caméra est nécessaire ; on interdit micro/géoloc
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;

    # ---- Healthcheck pour Dokploy ----
    location = /healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # ---- index.html : JAMAIS mis en cache ----
    # C'est ce qui évite le problème de "vieille version" sur les téléphones :
    # chaque visite recharge la page (2-3 Ko gzippés, négligeable).
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;
    }
    location = / {
        add_header Cache-Control "no-store, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;
        try_files /index.html =404;
    }

    # ---- Le bundle Camera Kit : cache long (il ne change jamais) ----
    location ~* \.(mjs|js)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        types { application/javascript mjs js; }
    }

    # ---- Reste ----
    location / {
        try_files $uri $uri/ =404;
    }
}
